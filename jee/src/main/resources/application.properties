# ==========================================
# Application - Location de Véhicules
# ENSET Mohammedia - Master SDIA
# ==========================================
spring.application.name=location-vehicules

# ==========================================
# Serveur
# ==========================================
server.port=8088

# ==========================================
# Base de données MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/location_agence?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Casablanca&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Africa/Casablanca

# ==========================================
# Encodage
# ==========================================
spring.mandatory-file-encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==========================================
# JWT
# ==========================================
app.jwt.secret=c2VjcmV0LWtleS1lbm1pZmRhbGktZXhhbWVuLWplZS1tYXN0ZXItc2RpYS1lbnNldA==
app.jwt.expiration=86400000

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ==========================================
# Logs
# ==========================================
logging.level.elmifdali.examen.jee=DEBUG
logging.level.org.springframework.security=INFO
# corrections finales
